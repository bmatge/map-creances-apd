// ---------------------------------------------------------------------------
// Web Component
// ---------------------------------------------------------------------------
class ClubParisMap extends HTMLElement {
  constructor() {
    super();
    this.attachShadow({ mode: 'open' });
    this._data = null;
    this._selectedYear = 2024;
    this._filterMode = 'all';
    this._debtFilter = 'apd';
    this._selectedIso = null;
    this._geojson = null;
    this._projection = null;
    this._pathGen = null;
    this._zoom = null;
    this._lang = 'fr';
  }

  _detectLang() {
    const attr = this.getAttribute('lang');
    if (attr === 'en') return 'en';
    if (attr === 'fr') return 'fr';
    const params = new URLSearchParams(window.location.search);
    const p = params.get('lang');
    if (p === 'en') return 'en';
    if (p === 'fr') return 'fr';
    const html = document.documentElement.lang?.toLowerCase() ?? '';
    if (html.startsWith('en')) return 'en';
    return 'fr';
  }

  _t(key) {
    return TRANSLATIONS[this._lang][key] ?? TRANSLATIONS.fr[key] ?? key;
  }

  _isoToName(iso) {
    return COUNTRY_NAMES[this._lang][iso] || iso;
  }

  _isoToNameMap() {
    return COUNTRY_NAMES[this._lang];
  }

  connectedCallback() {
    this._lang = this._detectLang();
    this.shadowRoot.innerHTML = `
      <style>${this._getStyles()}</style>
      <div class="wrapper">
        <div class="map-area" id="map-area">
          <div class="panel" id="panel">
            <button class="panel-close" id="panel-close">&times;</button>
            <div id="panel-content"></div>
          </div>
          <div class="tooltip" id="tooltip"></div>
          <div class="loading-overlay" id="loading">
            <div class="spinner"></div>
            <span>${this._t('loading')}</span>
          </div>
        </div>
        <div class="bottom-bar">
          <span class="filter-label">${this._t('filter.bar_label')}</span>
          <div class="filter-select-group">
            <select class="filter-select" id="filter-type" title="${this._t('filter.treatment_type')}">
              <option value="all">${this._t('filter.all')}</option>
              <option value="débiteur">${this._t('filter.debtors')}</option>
              <option value="créditeur">${this._t('filter.creditors')}</option>
            </select>
          </div>
          <div class="filter-select-group" id="debt-sub-group" style="display:none">
            <select class="filter-select" id="filter-debt-type">
              <option value="apd">${this._t('filter.apd')}</option>
              <option value="napd">${this._t('filter.napd')}</option>
            </select>
          </div>
          <div class="filter-select-group">
            <select class="filter-select" id="year-select" title="${this._t('filter.year')}"></select>
          </div>
          <button class="apply-btn" id="apply-btn">${this._t('filter.apply')}</button>
          <div class="filter-spacer"></div>
          <div class="search-container" id="search-container">
            <input type="text" class="search-input" id="search-input" placeholder="${this._t('search.placeholder')}" autocomplete="off" />
            <div class="search-dropdown" id="search-dropdown"></div>
          </div>
        </div>
      </div>
    `;
    this._setup();
  }

  async _setup() {
    this._buildYearSelect();
    this._bindEvents();
    await this._loadData();
    this._initMap();
    this.shadowRoot.getElementById('loading').style.display = 'none';
  }

  _buildYearSelect() {
    const select = this.shadowRoot.getElementById('year-select');
    for (let y = 2010; y <= 2024; y++) {
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y;
      if (y === 2024) opt.selected = true;
      select.appendChild(opt);
    }
  }

  _bindEvents() {
    const sr = this.shadowRoot;

    const filterType = sr.getElementById('filter-type');
    filterType.addEventListener('change', () => {
      const debtSubGroup = sr.getElementById('debt-sub-group');
      debtSubGroup.style.display = filterType.value === 'débiteur' ? 'inline-flex' : 'none';
    });

    sr.getElementById('apply-btn').addEventListener('click', () => {
      this._filterMode = sr.getElementById('filter-type').value;
      this._debtFilter = sr.getElementById('filter-debt-type').value;
      this._selectedYear = parseInt(sr.getElementById('year-select').value);
      this._updateColors();
      this._updatePanel();
    });

    sr.getElementById('panel-close').addEventListener('click', () => this._closePanel());

    // Search autocomplete
    const searchInput = sr.getElementById('search-input');
    const searchDropdown = sr.getElementById('search-dropdown');
    let activeIdx = -1;

    searchInput.addEventListener('input', () => {
      const query = searchInput.value.trim().toLowerCase();
      if (!query) { searchDropdown.classList.remove('open'); return; }
      const results = this._searchCountries(query);
      activeIdx = -1;
      if (results.length === 0) {
        searchDropdown.innerHTML = `<div class="search-no-result">${this._t('search.no_result')}</div>`;
      } else {
        searchDropdown.innerHTML = results.map((r, i) =>
          `<div class="search-option" data-iso="${r.iso}" data-index="${i}">${r.highlighted}</div>`
        ).join('');
      }
      searchDropdown.classList.add('open');
    });

    searchInput.addEventListener('keydown', (e) => {
      const options = searchDropdown.querySelectorAll('.search-option');
      if (!options.length) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIdx = Math.min(activeIdx + 1, options.length - 1);
        options.forEach((o, i) => o.classList.toggle('active', i === activeIdx));
        options[activeIdx]?.scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIdx = Math.max(activeIdx - 1, 0);
        options.forEach((o, i) => o.classList.toggle('active', i === activeIdx));
        options[activeIdx]?.scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const sel = activeIdx >= 0 ? options[activeIdx] : options[0];
        if (sel) {
          this._selectCountry(sel.dataset.iso);
          searchInput.value = this._isoToName(sel.dataset.iso);
          searchDropdown.classList.remove('open');
        }
      } else if (e.key === 'Escape') {
        searchDropdown.classList.remove('open');
        searchInput.blur();
      }
    });

    searchDropdown.addEventListener('click', (e) => {
      const opt = e.target.closest('.search-option');
      if (opt) {
        this._selectCountry(opt.dataset.iso);
        searchInput.value = this._isoToName(opt.dataset.iso);
        searchDropdown.classList.remove('open');
      }
    });

    document.addEventListener('click', (e) => {
      if (!this.shadowRoot.getElementById('search-container').contains(e.composedPath()[0])) {
        searchDropdown.classList.remove('open');
      }
    });
  }

  async _loadData() {
    const base = new URL('.', location.href).href;
    const [dataResp, topoResp] = await Promise.all([
      fetch(base + 'data.json'),
      fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    ]);
    this._data = await dataResp.json();
    const topo = await topoResp.json();
    this._geojson = topojson.feature(topo, topo.objects.countries);
  }

  _initMap() {
    const container = this.shadowRoot.getElementById('map-area');
    const w = container.clientWidth;
    const h = container.clientHeight;

    this._projection = d3.geoMercator()
      .scale(w / 6.5)
      .center([10, 25])
      .translate([w / 2, h / 2]);

    this._pathGen = d3.geoPath().projection(this._projection);

    const svg = d3.select(container)
      .insert('svg', ':first-child')
      .attr('width', w)
      .attr('height', h)
      .style('display', 'block');

    const g = svg.append('g');

    this._zoom = d3.zoom()
      .scaleExtent([1, 8])
      .on('zoom', (event) => g.attr('transform', event.transform));
    svg.call(this._zoom);

    const self = this;
    g.selectAll('path')
      .data(this._geojson.features)
      .join('path')
      .attr('d', this._pathGen)
      .attr('class', 'country')
      .attr('data-id', d => this._numToIso(String(d.id)) || '')
      .attr('fill', d => {
        const iso = this._numToIso(String(d.id));
        return iso ? this._getColor(iso) : '#e5e7eb';
      })
      .attr('stroke', '#fff')
      .attr('stroke-width', 0.5)
      .style('cursor', 'pointer')
      .on('click', function(event, d) {
        const iso = self._numToIso(String(d.id));
        if (iso) self._selectCountry(iso);
      })
      .on('mouseenter', function(event, d) {
        const iso = self._numToIso(String(d.id));
        d3.select(this).attr('stroke', '#3b82f6').attr('stroke-width', 1.5);
        self._showTooltip(event, iso, d);
      })
      .on('mousemove', function(event) {
        self._moveTooltip(event);
      })
      .on('mouseleave', function() {
        const iso = self._numToIso(String(d3.select(this).datum().id));
        const isSel = iso === self._selectedIso;
        d3.select(this)
          .attr('stroke', isSel ? '#1e40af' : '#fff')
          .attr('stroke-width', isSel ? 2 : 0.5);
        self._hideTooltip();
      });

    this._svg = svg;
    this._g = g;

    this._resizeObserver = new ResizeObserver(() => this._onResize());
    this._resizeObserver.observe(container);
  }

  _onResize() {
    const container = this.shadowRoot.getElementById('map-area');
    if (!container || !this._svg) return;
    const w = container.clientWidth;
    const h = container.clientHeight;
    if (w < 1 || h < 1) return;

    this._projection
      .scale(w / 6.5)
      .center([10, 25])
      .translate([w / 2, h / 2]);
    this._pathGen = d3.geoPath().projection(this._projection);

    this._svg.attr('width', w).attr('height', h);
    this._g.selectAll('path.country').attr('d', this._pathGen);

    this._svg.call(this._zoom.transform, d3.zoomIdentity);
  }

  _updateColors() {
    if (!this._g) return;
    this._maxDebtor = null;
    this._computeMaxValues();
    const self = this;
    this._g.selectAll('path.country')
      .attr('fill', function() {
        const iso = d3.select(this).attr('data-id');
        return iso ? self._getColor(iso) : '#e5e7eb';
      })
      .attr('stroke', function() {
        const iso = d3.select(this).attr('data-id');
        return iso === self._selectedIso ? '#1e40af' : '#fff';
      })
      .attr('stroke-width', function() {
        const iso = d3.select(this).attr('data-id');
        return iso === self._selectedIso ? 2 : 0.5;
      });
  }

  _showTooltip(event, iso, d) {
    const tip = this.shadowRoot.getElementById('tooltip');
    const yd = this._getYearData();
    const c = yd?.countries[iso];
    const name = this._isoToName(iso) || d.properties?.name || iso;
    let text = name;
    if (c) {
      if (c.debtor && c.debtor.total > 0) text += ` — ${this._t('map.debt')}: ${this._fmt(c.debtor.total)}`;
      if (c.creditor) text += ` — ${this._t('map.creditor_label')} (${c.creditor.nbAccords} ${this._t('map.agreements')})`;
    }
    tip.textContent = text;
    tip.style.display = 'block';
    this._moveTooltip(event);
  }

  _moveTooltip(event) {
    const tip = this.shadowRoot.getElementById('tooltip');
    const area = this.shadowRoot.getElementById('map-area');
    const rect = area.getBoundingClientRect();
    tip.style.left = (event.clientX - rect.left + 12) + 'px';
    tip.style.top = (event.clientY - rect.top - 28) + 'px';
  }

  _hideTooltip() {
    this.shadowRoot.getElementById('tooltip').style.display = 'none';
  }

  _selectCountry(iso) {
    this._selectedIso = iso;
    this._updateColors();
    this._updatePanel();
    this.shadowRoot.getElementById('panel').classList.add('open');
  }

  _closePanel() {
    this.shadowRoot.getElementById('panel').classList.remove('open');
    this._selectedIso = null;
    this._updateColors();
  }

  _searchCountries(query) {
    const yd = this._getYearData();
    if (!yd) return [];
    const names = this._isoToNameMap();
    const results = [];
    for (const [iso, name] of Object.entries(names)) {
      const country = yd.countries[iso];
      if (!country) continue;
      if (this._filterMode === 'débiteur' && !(country.debtor && country.debtor.total > 0)) continue;
      if (this._filterMode === 'créditeur' && !country.creditor) continue;
      const lower = name.toLowerCase();
      const idx = lower.indexOf(query);
      if (idx === -1) continue;
      const highlighted = name.substring(0, idx)
        + '<span class="match">' + name.substring(idx, idx + query.length) + '</span>'
        + name.substring(idx + query.length);
      results.push({ iso, name, highlighted, startsWithMatch: idx === 0 });
    }
    results.sort((a, b) => {
      if (a.startsWithMatch !== b.startsWithMatch) return a.startsWithMatch ? -1 : 1;
      return a.name.localeCompare(b.name, this._lang);
    });
    return results.slice(0, 6);
  }

  // ---- Data helpers ----

  _numToIso(numId) {
    const map = {
      '004':'AFG','008':'ALB','012':'DZA','024':'AGO','028':'ATG','032':'ARG',
      '036':'AUS','040':'AUT','051':'ARM','031':'AZE','050':'BGD','052':'BRB',
      '056':'BEL','084':'BLZ','204':'BEN','068':'BOL','070':'BIH','072':'BWA',
      '076':'BRA','096':'BRN','100':'BGR','854':'BFA','108':'BDI','116':'KHM',
      '120':'CMR','124':'CAN','132':'CPV','140':'CAF','148':'TCD','152':'CHL',
      '156':'CHN','170':'COL','174':'COM','178':'COG','180':'COD','188':'CRI',
      '384':'CIV','191':'HRV','192':'CUB','196':'CYP','203':'CZE','208':'DNK',
      '262':'DJI','212':'DMA','214':'DOM','218':'ECU','818':'EGY','222':'SLV',
      '226':'GNQ','232':'ERI','233':'EST','231':'ETH','242':'FJI','246':'FIN',
      '250':'FRA','266':'GAB','270':'GMB','268':'GEO','276':'DEU','288':'GHA',
      '300':'GRC','308':'GRD','320':'GTM','324':'GIN','624':'GNB','328':'GUY',
      '332':'HTI','340':'HND','348':'HUN','352':'ISL','356':'IND','360':'IDN',
      '364':'IRN','368':'IRQ','372':'IRL','376':'ISR','380':'ITA','388':'JAM',
      '392':'JPN','400':'JOR','398':'KAZ','404':'KEN','408':'PRK','410':'KOR',
      '414':'KWT','417':'KGZ','418':'LAO','428':'LVA','422':'LBN','426':'LSO',
      '430':'LBR','434':'LBY','440':'LTU','442':'LUX','807':'MKD','450':'MDG',
      '454':'MWI','458':'MYS','462':'MDV','466':'MLI','470':'MLT','478':'MRT',
      '480':'MUS','484':'MEX','498':'MDA','496':'MNG','499':'MNE','504':'MAR',
      '508':'MOZ','104':'MMR','516':'NAM','524':'NPL','528':'NLD','554':'NZL',
      '558':'NIC','562':'NER','566':'NGA','578':'NOR','512':'OMN','586':'PAK',
      '591':'PAN','598':'PNG','600':'PRY','604':'PER','608':'PHL','616':'POL',
      '620':'PRT','634':'QAT','642':'ROU','643':'RUS','646':'RWA','882':'WSM',
      '678':'STP','682':'SAU','686':'SEN','688':'SRB','690':'SYC','694':'SLE',
      '702':'SGP','703':'SVK','705':'SVN','090':'SLB','706':'SOM','710':'ZAF',
      '728':'SSD','724':'ESP','144':'LKA','662':'LCA','670':'VCT','729':'SDN',
      '740':'SUR','748':'SWZ','752':'SWE','756':'CHE','760':'SYR','762':'TJK',
      '834':'TZA','764':'THA','768':'TGO','780':'TTO','788':'TUN','792':'TUR',
      '795':'TKM','800':'UGA','804':'UKR','784':'ARE','826':'GBR','840':'USA',
      '858':'URY','860':'UZB','862':'VEN','704':'VNM','887':'YEM','894':'ZMB',
      '716':'ZWE','-99':'XKX','659':'KNA'
    };
    return map[numId] || null;
  }

  _getYearData() {
    return this._data ? this._data[String(this._selectedYear)] : null;
  }

  _getColor(iso) {
    const yd = this._getYearData();
    if (!yd) return '#e5e7eb';
    const c = yd.countries[iso];
    if (!c) return '#e5e7eb';
    const isDebtor = c.debtor && c.debtor.total > 0;
    const isCreditor = !!c.creditor;
    if (!this._maxDebtor) this._computeMaxValues();

    if (this._filterMode === 'créditeur') {
      return isCreditor ? this._greenScale(c.creditor.nbAccords) : '#e5e7eb';
    }
    if (this._filterMode === 'débiteur') {
      if (!isDebtor) return '#e5e7eb';
      const val = this._debtFilter === 'apd' ? c.debtor.apd : c.debtor.napd;
      return val > 0 ? this._orangeScale(val) : '#e5e7eb';
    }
    if (isCreditor && !isDebtor) return this._greenScale(c.creditor.nbAccords);
    if (isDebtor) return this._orangeScale(c.debtor.apd);
    if (isCreditor) return this._greenScale(c.creditor.nbAccords);
    return '#e5e7eb';
  }

  _computeMaxValues() {
    const yd = this._getYearData();
    if (!yd) { this._maxDebtor = 1; this._maxCreditor = 1; return; }
    let maxD = 1, maxC = 1;
    for (const c of Object.values(yd.countries)) {
      if (c.debtor) {
        const v = this._debtFilter === 'apd' ? c.debtor.apd : c.debtor.napd;
        if (v > maxD) maxD = v;
      }
      if (c.creditor && c.creditor.nbAccords > maxC) maxC = c.creditor.nbAccords;
    }
    this._maxDebtor = maxD;
    this._maxCreditor = maxC;
  }

  _orangeScale(val) {
    const t = Math.min(val / this._maxDebtor, 1);
    return this._interpolateColors([[254,243,226],[253,186,116],[249,115,22],[194,65,12]], t);
  }

  _greenScale(val) {
    const t = Math.min(val / this._maxCreditor, 1);
    return this._interpolateColors([[236,253,245],[110,231,183],[16,185,129],[4,120,87]], t);
  }

  _interpolateColors(colors, t) {
    const n = colors.length - 1;
    const idx = Math.min(Math.floor(t * n), n - 1);
    const local = (t * n) - idx;
    const c1 = colors[idx], c2 = colors[idx + 1];
    const r = Math.round(c1[0] + (c2[0] - c1[0]) * local);
    const g = Math.round(c1[1] + (c2[1] - c1[1]) * local);
    const b = Math.round(c1[2] + (c2[2] - c1[2]) * local);
    return `rgb(${r},${g},${b})`;
  }

  _updatePanel() {
    const el = this.shadowRoot.getElementById('panel-content');
    if (!this._selectedIso) { el.innerHTML = ''; return; }
    const yd = this._getYearData();
    const c = yd?.countries[this._selectedIso];
    if (!c) { el.innerHTML = `<p class="no-data">${this._t('map.no_data')}</p>`; return; }

    const name = this._isoToName(this._selectedIso) || c.country;
    const isDebtor = c.debtor && c.debtor.total > 0;
    const isCreditor = !!c.creditor;

    let html = `<h2 class="panel-country-name">${name}</h2>`;

    if (isDebtor) {
      html += `
        <div class="info-row">
          <span class="info-icon">${ICON_TREND_UP}</span>
          <div class="info-text">
            <span class="info-label">${this._t('panel.claim_apd')}</span>
            <span class="info-value">${this._fmtMillions(c.debtor.apd)}</span>
          </div>
        </div>
        <div class="info-row">
          <span class="info-icon">${ICON_TREND_DOWN}</span>
          <div class="info-text">
            <span class="info-label">${this._t('panel.claim_napd')}</span>
            <span class="info-value">${this._fmtMillions(c.debtor.napd)}</span>
          </div>
        </div>`;
    }

    if (isCreditor) {
      html += `
        <div class="info-row">
          <span class="info-icon">${ICON_AGREEMENTS}</span>
          <div class="info-text">
            <span class="info-label">${this._t('panel.agreements')}</span>
            <span class="info-value">${c.creditor.nbAccords}</span>
          </div>
        </div>`;
      if (c.creditor.premiereParticipation) {
        html += `
        <div class="info-row">
          <span class="info-icon">${ICON_CALENDAR}</span>
          <div class="info-text">
            <span class="info-label">${this._t('panel.member_since')}</span>
            <span class="info-value">${c.creditor.premiereParticipation}</span>
          </div>
        </div>`;
      }
    }

    html += `
      <div class="info-row">
        <span class="info-icon">${ICON_CALENDAR}</span>
        <div class="info-text">
          <span class="info-label">${this._t('panel.last_update')}</span>
          <span class="info-value-bold">${this._selectedYear}</span>
        </div>
      </div>`;

    const url = c.debtor?.url || c.creditor?.url;
    if (url) {
      html += `<a class="panel-cta" href="${url}" target="_blank" rel="noopener">${this._t('panel.view_profile')}</a>`;
    }

    html += `<div class="panel-logo-area">
      <div class="panel-logo-badge">
        <svg viewBox="0 0 40 40" width="32" height="32"><circle cx="20" cy="20" r="18" fill="#1a1a2e"/><text x="20" y="24" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">CP</text></svg>
        <span class="panel-logo-letter">A</span>
      </div>
    </div>`;

    el.innerHTML = html;
  }

  _fmt(val) {
    if (val >= 1e9) return `${(val / 1e9).toFixed(2)} Md$`;
    if (val >= 1e6) return `${(val / 1e6).toFixed(1)} M$`;
    if (val === 0) return '0 $';
    return val.toLocaleString('fr-FR', { maximumFractionDigits: 0 }) + ' $';
  }

  _fmtMillions(val) {
    if (val >= 1e9) return `${(val / 1e6).toLocaleString('fr-FR', { maximumFractionDigits: 0 })} millions $`;
    if (val >= 1e6) return `${Math.round(val / 1e6).toLocaleString('fr-FR')} millions $`;
    if (val === 0) return '0 $';
    return val.toLocaleString('fr-FR', { maximumFractionDigits: 0 }) + ' $';
  }

      /* ---- RESPONSIVE ---- */

      @container wrapper (max-width: 700px) {

        .filter-select-group { justify-content: center; }
        .filter-select { width: 100%; box-sizing: border-box; }
        .search-container { order: -1; }
        .search-input { width: 100%; box-sizing: border-box; }
        .apply-btn { width: 100%; }
        .filter-spacer { display: none; }
        .panel { width: 100%; max-width: 100%; }
        .panel-country-name { font-size: 1.1rem; }
        .info-value { font-size: 0.9rem; }
      }

      @media (max-width: 700px) {
        .bottom-bar { gap: 0.5rem; padding: 0.5rem 0.5rem; }
        .search-input { width: 130px; }
        .panel { width: 280px; }
        .panel-country-name { font-size: 1.15rem; }
      }
      @media (max-width: 480px) {
        .bottom-bar { flex-direction: column; align-items: stretch; gap: 0.4rem; padding: 0.4rem 0.5rem; }
        .filter-label { text-align: center; }
        .filter-select-group { justify-content: center; }
        .filter-select { width: 100%; box-sizing: border-box; }
        .search-container { order: -1; }
        .search-input { width: 100%; box-sizing: border-box; }
        .apply-btn { width: 100%; }

        .panel { width: 100%; max-width: 100%; }

  }
}
