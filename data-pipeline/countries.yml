# Fields
#   name_fr, name_en     Canonical display names (authoritative).
#   aliases              Raw strings as they may appear in source CSV/Excel.
#                        Matching is case-sensitive after whitespace collapse;
#                        add new variants here when the pipeline reports 'unmapped'.
#   url_slug_debtor      Slug under clubdeparis.org .../par pays-debiteurs/<slug>.html
#   url_slug_creditor    Slug under clubdeparis.org .../par-pays-crediteurs/<slug>.html
#
# Editing rules
#   - ISO keys kept sorted alphabetically.
#   - A country may have only one of the two url_slug_* fields set.
#   - Historical debtor URLs on clubdeparis.org use a literal space in the segment
