name: Build data.json

on:
  push:
    branches: ['main']
    paths:
      - 'sources/**'
      - 'processing/**'
      - '.github/workflows/build-data.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build data.json from CSV sources
        run: python3 processing/build_data.py

      - name: Commit regenerated data.json
        run: |
          if git diff --quiet data.json; then
            echo "data.json is up to date — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "chore: regenerate data.json from sources [skip ci]"
          git push
