name: Mirror → mef-snum-miweb

on:
  push:
  workflow_dispatch:

concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (bare)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all refs
        run: |
          git fetch --prune --tags origin '+refs/heads/*:refs/heads/*'

      - name: Mirror push to mef-snum-miweb/clubdeparis-website-map
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          git push --mirror \
            "https://x-access-token:${MIRROR_TOKEN}@github.com/mef-snum-miweb/clubdeparis-website-map.git"
